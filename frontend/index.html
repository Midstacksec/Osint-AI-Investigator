<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Osint Investigator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Osint AI Investigator</h1>

    <div class="top-bar">
      <input id="email" placeholder="Enter email to investigate">
      <button onclick="investigate()">
        <span class="button-icon">🔍</span>
        Investigate
      </button>
      <button onclick="downloadPDF()">
        <span class="button-icon">📄</span>
        Download PDF
      </button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
